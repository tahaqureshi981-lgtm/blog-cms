<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blog App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
    }

    nav {
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      padding: 16px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    nav h1 { font-size: 20px; font-weight: 600; color: #fff; }

    nav div { display: flex; gap: 12px; }

    .btn {
      padding: 8px 18px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .btn-primary { background: #6c63ff; color: #fff; }
    .btn-primary:hover { background: #5a52d5; }
    .btn-secondary { background: #2a2a2a; color: #ccc; border: 1px solid #3a3a3a; }
    .btn-secondary:hover { background: #333; color: #fff; }
    .btn-danger { background: #ff4d4d; color: #fff; }
    .btn-danger:hover { background: #e03c3c; }

    .page { display: none; }
    .page.active { display: block; }

    .container {
      max-width: 500px;
      margin: 80px auto;
      padding: 0 20px;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 32px;
    }

    .card h2 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .card p.subtitle {
      color: #888;
      font-size: 14px;
      margin-bottom: 28px;
    }

    .form-group { margin-bottom: 18px; }

    .form-group label {
      display: block;
      font-size: 13px;
      color: #aaa;
      margin-bottom: 6px;
    }

    .form-group input, .form-group textarea {
      width: 100%;
      padding: 10px 14px;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: #f0f0f0;
      font-size: 14px;
      outline: none;
      transition: border 0.2s;
      font-family: inherit;
    }

    .form-group input:focus, .form-group textarea:focus {
      border-color: #6c63ff;
    }

    .form-group textarea { resize: vertical; min-height: 100px; }

    .form-footer {
      margin-top: 8px;
      text-align: center;
      font-size: 13px;
      color: #666;
    }

    .form-footer span {
      color: #6c63ff;
      cursor: pointer;
    }

    .form-footer span:hover { text-decoration: underline; }

    .error {
      background: #2a1010;
      border: 1px solid #ff4d4d;
      color: #ff4d4d;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .success {
      background: #0f2a1a;
      border: 1px solid #4dff91;
      color: #4dff91;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    /* Posts page */
    .posts-container {
      max-width: 700px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .posts-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }

    .posts-header h2 { font-size: 22px; font-weight: 600; }

    .post-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 22px 24px;
      margin-bottom: 16px;
      transition: border-color 0.2s;
    }

    .post-card:hover { border-color: #6c63ff; }

    .post-card h3 { font-size: 17px; font-weight: 600; margin-bottom: 8px; }

    .post-card p { font-size: 14px; color: #888; line-height: 1.6; }

    .no-posts {
      text-align: center;
      color: #555;
      padding: 60px 0;
      font-size: 15px;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }

    .modal-overlay.active { display: flex; }

    .modal {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 460px;
      margin: 20px;
    }

    .modal h3 { font-size: 20px; font-weight: 600; margin-bottom: 24px; }

    .modal-footer {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 8px;
    }

    .token-badge {
      background: #1a2a1a;
      border: 1px solid #2a4a2a;
      color: #4dff91;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
    }
  </style>
</head>
<body>

<nav>
  <h1>✍️ Blog</h1>
  <div id="navButtons">
    <button class="btn btn-secondary" onclick="showPage('login')">Login</button>
    <button class="btn btn-primary" onclick="showPage('signup')">Sign Up</button>
  </div>
</nav>

<!-- Signup Page -->
<div class="page active" id="page-signup">
  <div class="container">
    <div class="card">
      <h2>Create account</h2>
      <p class="subtitle">Join the blog and start writing.</p>
      <div class="error" id="signup-error"></div>
      <div class="success" id="signup-success"></div>
      <div class="form-group">
        <label>Full name</label>
        <input type="text" id="signup-name" placeholder="John Doe" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signup-email" placeholder="john@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signup-password" placeholder="••••••••" />
      </div>
      <button class="btn btn-primary" style="width:100%" onclick="signup()">Create account</button>
      <div class="form-footer">
        Already have an account? <span onclick="showPage('login')">Login</span>
      </div>
    </div>
  </div>
</div>

<!-- Login Page -->
<div class="page" id="page-login">
  <div class="container">
    <div class="card">
      <h2>Welcome back</h2>
      <p class="subtitle">Login to your account.</p>
      <div class="error" id="login-error"></div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="john@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" />
      </div>
      <button class="btn btn-primary" style="width:100%" onclick="login()">Login</button>
      <div class="form-footer">
        No account? <span onclick="showPage('signup')">Sign up</span>
      </div>
    </div>
  </div>
</div>

<!-- Posts Page -->
<div class="page" id="page-posts">
  <div class="posts-container">
    <div class="posts-header">
      <div style="display:flex;align-items:center;gap:12px">
        <h2>Posts</h2>
        <span class="token-badge" id="user-badge"></span>
      </div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-primary" onclick="openModal()">+ New Post</button>
        <button class="btn btn-danger" onclick="logout()">Logout</button>
      </div>
    </div>
    <div id="posts-list"></div>
  </div>
</div>

<!-- New Post Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>New Post</h3>
    <div class="error" id="post-error"></div>
    <div class="form-group">
      <label>Title</label>
      <input type="text" id="post-title" placeholder="My awesome post" />
    </div>
    <div class="form-group">
      <label>Content</label>
      <textarea id="post-content" placeholder="Write something..."></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="addPost()">Publish</button>
    </div>
  </div>
</div>

<script>
  const API = "https://blog-cms-production-36b6.up.railway.app";
  let accessToken = localStorage.getItem("access_token");
  let refreshToken = localStorage.getItem("refresh_token");

  window.onload = () => {
    if (accessToken) {
      showPage('posts');
      loadPosts();
    } else {
      showPage('signup');
    }
  };

  function showPage(name) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
    if (name === 'posts') {
      document.getElementById('navButtons').innerHTML = '';
    } else {
      document.getElementById('navButtons').innerHTML = `
        <button class="btn btn-secondary" onclick="showPage('login')">Login</button>
        <button class="btn btn-primary" onclick="showPage('signup')">Sign Up</button>`;
    }
  }

  async function signup() {
    const fullname = document.getElementById('signup-name').value;
    const email = document.getElementById('signup-email').value;
    const password = document.getElementById('signup-password').value;
    const errEl = document.getElementById('signup-error');
    const sucEl = document.getElementById('signup-success');
    errEl.style.display = 'none';
    sucEl.style.display = 'none';

    const res = await fetch(`${API}/user/signup`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ fullname, email, password })
    });
    const data = await res.json();
    if (data.access_token) {
      accessToken = data.access_token;
      refreshToken = data.refresh_token;
      localStorage.setItem("access_token", accessToken);
      localStorage.setItem("refresh_token", refreshToken);
      showPage('posts');
      loadPosts();
    } else {
      errEl.textContent = data.detail || "Signup failed.";
      errEl.style.display = 'block';
    }
  }

  async function login() {
    const email = document.getElementById('login-email').value;
    const password = document.getElementById('login-password').value;
    const errEl = document.getElementById('login-error');
    errEl.style.display = 'none';

    const res = await fetch(`${API}/user/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (data.access_token) {
      accessToken = data.access_token;
      refreshToken = data.refresh_token;
      localStorage.setItem("access_token", accessToken);
      localStorage.setItem("refresh_token", refreshToken);
      showPage('posts');
      loadPosts();
    } else {
      errEl.textContent = data.error || "Wrong login details.";
      errEl.style.display = 'block';
    }
  }

  async function loadPosts() {
    const res = await fetch(`${API}/posts`);
    const data = await res.json();
    const list = document.getElementById('posts-list');
    const badge = document.getElementById('user-badge');
    badge.textContent = '🔑 logged in';
    if (!data.data || data.data.length === 0) {
      list.innerHTML = '<div class="no-posts">No posts yet. Write the first one!</div>';
      return;
    }
    list.innerHTML = data.data.map(post => `
      <div class="post-card">
        <h3>${post.title}</h3>
        <p>${post.content}</p>
      </div>
    `).join('');
  }

  async function addPost() {
    const title = document.getElementById('post-title').value;
    const content = document.getElementById('post-content').value;
    const errEl = document.getElementById('post-error');
    errEl.style.display = 'none';

    const res = await fetch(`${API}/posts`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${accessToken}`
      },
      body: JSON.stringify({ title, content })
    });

    if (res.status === 403) {
      await tryRefresh();
      return;
    }

    const data = await res.json();
    if (data.data) {
      closeModal();
      loadPosts();
    } else {
      errEl.textContent = "Failed to add post.";
      errEl.style.display = 'block';
    }
  }

  async function tryRefresh() {
    const res = await fetch(`${API}/user/refresh`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ refresh_token: refreshToken })
    });
    const data = await res.json();
    if (data.access_token) {
      accessToken = data.access_token;
      localStorage.setItem("access_token", accessToken);
      addPost();
    } else {
      logout();
    }
  }

  function logout() {
    localStorage.removeItem("access_token");
    localStorage.removeItem("refresh_token");
    accessToken = null;
    refreshToken = null;
    showPage('login');
  }

  function openModal() {
    document.getElementById('modal').classList.add('active');
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('active');
    document.getElementById('post-title').value = '';
    document.getElementById('post-content').value = '';
  }
</script>

</body>
</html>
